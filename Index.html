<script>
let lang='es', currentTab='desgloce';

/* ================================
   🔥 FUNCIÓN PDF (CORREGIDA)
================================ */
function downloadPDF(){
  const element = document.getElementById('preview-content');

  if(!element){
    alert('No se encontró el contenido');
    return;
  }

  const opt = {
    margin: 0.5,
    filename: 'documento.pdf',
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
  };

  html2pdf().set(opt).from(element).save();
}

/* ================================
   🔥 RESTO DE TU JS (SIN ERRORES)
================================ */

function showTab(tab){
  currentTab=tab;
  ['desgloce','cotizacion','recibo','admission'].forEach(t2=>{
    document.getElementById('tab-'+t2).style.display=t2===tab?'block':'none';
    document.getElementById('nav-'+t2).classList.toggle('active',t2===tab);
  });
  document.getElementById('topbar-title').textContent=L[lang].tabs[tab];
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===l.toUpperCase()));
  toggleMN();
  applyLabels();
  buildPicker('d');buildPicker('c');
  renderItems('d');renderItems('c');
}

function applyLabels(){
  const map={
    'topbar-title':L[lang].tabs[currentTab],
    'nl-d':L[lang].nav.d,'nl-c':L[lang].nav.c,'nl-r':L[lang].nav.r,'nl-a':L[lang].nav.a,
    's-patinfo':L[lang].patinfo,'s-patient':L[lang].patient,'s-date':L[lang].date,'s-city':L[lang].city,'s-clinic':L[lang].clinic,
    's-items-d':L[lang].itemsd,'s-desc-d':L[lang].desc,'s-qty-d':L[lang].qty,'s-mn-d':'MXN',
    's-dates':L[lang].dates,'s-dates-lbl':L[lang].datesLbl,'s-prev-d':L[lang].preview,'s-pdf-d':L[lang].pdf,
    's-items-c':L[lang].itemsc,'s-desc-c':L[lang].desc,'s-qty-c':L[lang].qty,'s-mn-c':'MXN',
    's-prev-c':L[lang].preview,'s-pdf-c':L[lang].pdf,
    's-payinfo':L[lang].payinfo,'s-dep':L[lang].dep,'s-method':L[lang].method,
    's-totproc':L[lang].totproc,'s-due':L[lang].due,'s-concept':L[lang].concept,'s-procr':L[lang].procr,
    's-prev-r':L[lang].preview,'s-pdf-r':L[lang].pdf,
    's-surginfo':L[lang].surginfo,'s-surgdate':L[lang].surgdate,'s-checkin':L[lang].checkin,'s-proca':L[lang].proca,
    's-coord':L[lang].coord,'s-coordtel':L[lang].coordtel,'s-coordemail':L[lang].coordemail,
    's-prev-a':L[lang].preview,'s-pdf-a':L[lang].pdf,
  };

  for(const[id,val]of Object.entries(map)){
    const el=document.getElementById(id);
    if(el)el.textContent=val;
  }
}

document.addEventListener('DOMContentLoaded',()=>{
  const today=new Date();
  document.getElementById('doc-date').value=today.toISOString().slice(0,10);

  const opts={year:'numeric',month:'long',day:'numeric'};
  document.getElementById('fx-date').textContent=today.toLocaleDateString('es-MX',opts);

  updateClinicOptions();
  buildPicker('d');buildPicker('c');
  toggleMN();
  applyLabels();
});
</script>

</body>
